<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | ZeroWave</title>
  <meta name="description" content="Create your ZeroWave account to start earning ZeroTokens and tracking your sustainability impact." />
  <link rel="canonical" href="/registration" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --primary: #2F578A;
      --primary-glow: #4a78b5;
      --secondary: #F48F68;
      --accent: #333333;
      --bg: #FFF6DE;
      --text: #333333;
      --muted: #546E7A;
      --card: #ffffff;
      --radius: 16px;
      --shadow: 0 10px 30px -10px rgba(47, 87, 138, 0.15);
      --gradient-primary: linear-gradient(135deg, var(--primary), var(--primary-glow));
      --border: hsl(210 16% 92%)
    }
    [data-theme="dark"]{
      --bg: #11161d;
      --text: #F5F6F8;
      --muted: #8ba2be;
      --card: #18222f;
      --border: #253447;
    }
    
    [data-theme="dark"] body {
      background: var(--bg);
    }
    *{box-sizing:border-box}
    body{margin:0;background: linear-gradient(135deg, #FFFDF9 0%, #FFF6DE 100%);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:1rem}
    .wrap{position:relative;max-width:440px;width:100%;margin: 0 auto;}
    .card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);overflow:hidden}
    [data-theme="dark"] .card{border-color:var(--border)}
    .bg-illus{position:absolute;inset:-2px;background:url('./images/eco-pattern.jpg') center/cover no-repeat;filter:contrast(.9) opacity(.15);}
    .card > *{position:relative}
    .logo{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:var(--gradient-primary);color:#fff;box-shadow:var(--shadow);margin:0 auto 1rem}
    h1{font-family:Poppins,Inter,sans-serif;text-align:center;margin:.25rem 0 0}
    p.sub{text-align:center;color:var(--muted);margin:.5rem 0 1.25rem}
    label{font-weight:600;font-size:.9rem}
    input{width:100%;margin-top:.35rem;padding:.75rem .9rem;border-radius:12px;border:1px solid var(--border);background:transparent;color:inherit;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--primary)}
    .row{display:grid;gap:1rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;width:100%;border-radius:999px;border:0;padding:.9rem 1.1rem;font-weight:700;background:var(--gradient-primary);color:#fff;box-shadow:var(--shadow);cursor:pointer}
    .link{color:var(--primary);font-weight:600}
    .small{font-size:.9rem;color:var(--muted);text-align:center}
    .fade-in{animation:fade .4s ease both}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .theme{position:fixed;top:14px;right:14px;border:none;background:transparent;color:var(--muted);padding:.5rem;border-radius:10px;cursor:pointer}
  </style>
</head>
<body>
  <button class="theme" id="themeToggle" aria-label="Toggle theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
  <main class="wrap">
    <div class="card fade-in">
      <div class="bg-illus" aria-hidden="true"></div>
      <div class="logo"><i class="fa-solid fa-leaf"></i></div>
      <h1>Join ZeroWave</h1>
      <p class="sub">Start your journey to a greener tomorrow</p>

      <div id="errorMessage" style="display: none; background: rgba(244, 143, 104, 0.15); border-left: 4px solid var(--secondary); color: var(--secondary); padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;"></div>

      <form id="registrationForm" class="row">
        {% csrf_token %}
        <div>
          <label>Register As</label>
          <div style="display: flex; gap: 1.5rem; margin-top: 0.35rem; margin-bottom: 0.5rem;">
            <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 0.4rem;">
              <input type="radio" name="role" value="user" checked style="width: auto; margin: 0;" /> Individual / Household
            </label>
            <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 0.4rem;">
              <input type="radio" name="role" value="bank" style="width: auto; margin: 0;" /> Waste Collection Bank
            </label>
          </div>
        </div>
        <div>
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Enter your full name" required />
        </div>
        <div id="bankFields" style="display: none; border-left: 3px solid var(--primary); padding-left: 1rem; margin-bottom: 0.5rem;">
          <div style="margin-bottom: 1rem;">
            <label for="bankName">Bank / Department Name</label>
            <input id="bankName" name="bankName" type="text" placeholder="e.g. Delhi Recycling Bank" />
          </div>
        </div>
        <div>
          <label for="region">Select City / Region</label>
          <select id="region" name="region" required style="width: 100%; margin-top: .35rem; padding: .75rem .9rem; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: inherit; outline: none;">
            <option value="delhi">Delhi NCR</option>
            <option value="mumbai">Mumbai Metro</option>
            <option value="bengaluru">Bengaluru</option>
            <option value="hyderabad">Hyderabad</option>
            <option value="chennai">Chennai</option>
            <option value="kolkata">Kolkata</option>
            <option value="pune">Pune</option>
          </select>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="your.email@example.com" required />
        </div>
        <div>
            <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
            <div class="relative mt-1">
                <input id="phone" name="phone" type="tel" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="+1 (555) 123-4567">
            </div>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        </div>
        <div>
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter your password" required />
        </div>
        <button class="btn" type="submit">Join ZeroWave <span aria-hidden>🌿</span></button>
      </form>
      <p class="small" style="margin-top:1rem">Already have an account? <a class="link" href="{% url 'signin' %}">Sign In</a></p>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    // Firebase configuration - normally these would be injected or loaded from env
    const firebaseConfig = {
      apiKey: "{{ firebase_api_key }}",
      authDomain: "{{ firebase_auth_domain }}",
      projectId: "{{ firebase_project_id }}",
      storageBucket: "{{ firebase_storage_bucket }}",
      messagingSenderId: "{{ firebase_messaging_sender_id }}",
      appId: "{{ firebase_app_id }}"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const errDiv = document.getElementById('errorMessage');
    const showError = (msg) => {
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
    };
    const hideError = () => {
      errDiv.style.display = 'none';
      errDiv.textContent = '';
    };

    const roleRadios = document.querySelectorAll('input[name="role"]');
    const bankFields = document.getElementById('bankFields');
    const bankNameInput = document.getElementById('bankName');

    roleRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'bank') {
          bankFields.style.display = 'block';
          bankNameInput.required = true;
        } else {
          bankFields.style.display = 'none';
          bankNameInput.required = false;
        }
      });
    });

    const registrationForm = document.getElementById('registrationForm');
    registrationForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showError("Passwords do not match");
        return;
      }

      let userCredential = null;
      try {
        userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const idToken = await userCredential.user.getIdToken();

        const role = document.querySelector('input[name="role"]:checked').value;
        const bankName = document.getElementById('bankName').value;
        const region = document.getElementById('region').value;
        const phone = document.getElementById('phone').value;

        // Send token and metadata to backend
        const response = await fetch('/auth/firebase/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ 
            idToken: idToken,
            role: role,
            bankName: bankName,
            region: region,
            phone: phone
          })
        });

        if (response.ok) {
          window.location.href = '/dashboard';
        } else {
          // Clean up created user in Firebase since Django creation failed
          if (userCredential && userCredential.user) {
            await userCredential.user.delete().catch(err => console.error("Firebase deletion failed:", err));
          }
          const errData = await response.json().catch(() => ({}));
          showError("Authentication failed on server: " + (errData.message || response.statusText));
        }
      } catch (error) {
        // If Firebase signup succeeded but server failed, clean up if possible
        if (userCredential && userCredential.user) {
          await userCredential.user.delete().catch(err => console.error("Firebase deletion failed:", err));
        }
        showError(error.message);
      }
    });

    const t=document.getElementById('themeToggle');

    t.addEventListener('click',()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'':'dark';localStorage.setItem('theme',document.documentElement.dataset.theme||'light')});
    if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';
  </script>
</body>
</html>
