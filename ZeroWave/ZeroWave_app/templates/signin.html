<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In | ZeroWave</title>
  <meta name="description" content="Sign in to ZeroWave to track your sustainability progress and redeem rewards." />
  <link rel="canonical" href="/signin" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --primary: #8A9A5B;
      --primary-glow: #A2B570;
      --secondary: #E2725B;
      --accent: #333333;
      --bg: #F0F8A4;
      --text: #333333;
      --muted: #6E7A5A;
      --card: #ffffff;
      --radius: 16px;
      --shadow: 0 10px 30px -10px rgba(138, 154, 91, 0.15);
      --gradient-primary: linear-gradient(135deg, var(--primary), var(--primary-glow));
      --border: hsl(210 16% 92%)
    }
    [data-theme="dark"]{
      --bg: #141811;
      --text: #E6EAE0;
      --muted: #9AA38F;
      --card: #1D2219;
      --border: #2B3326;
    }
    
    [data-theme="dark"] body {
      background: var(--bg);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background: linear-gradient(135deg, #FAFDF3 0%, #F0F8A4 100%);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:1rem}
    .wrap{max-width:420px;width:100%;margin: 0 auto;}
    .panel{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);overflow:hidden}
    [data-theme="dark"] .panel{border-color:var(--border)}
    .bg{position:absolute;inset:-2px;background:url('./images/eco-pattern.jpg') center/cover no-repeat;opacity:.12}
    .panel>*{position:relative}
    .logo{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:var(--gradient-primary);color:#fff;box-shadow:var(--shadow);margin:0 auto 1rem}
    h1{font-family:Poppins,Inter,sans-serif;text-align:center;margin:.25rem 0 0}
    p.sub{text-align:center;color:var(--muted);margin:.5rem 0 1.25rem}
    label{font-weight:600;font-size:.9rem}
    input{width:100%;margin-top:.35rem;padding:.75rem .9rem;border-radius:12px;border:1px solid var(--border);background:transparent;color:inherit;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--primary)}
    .row{display:grid;gap:1rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;width:100%;border-radius:999px;border:0;padding:.9rem 1.1rem;font-weight:700;background:var(--gradient-primary);color:#fff;box-shadow:var(--shadow);cursor:pointer}
    .link{color:var(--primary);font-weight:600}
    .small{font-size:.9rem;color:var(--muted);text-align:center}
    .theme{position:fixed;top:14px;right:14px;border:none;background:transparent;color:var(--muted);padding:.5rem;border-radius:10px;cursor:pointer}
  </style>
</head>
<body>
  <button class="theme" id="themeToggle" aria-label="Toggle theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
  <main class="wrap">
    <div class="panel">
      <div class="bg" aria-hidden="true"></div>
      <div class="logo"><i class="fa-solid fa-leaf"></i></div>
      <h1>Welcome Back</h1>
      <p class="sub">Sign in to your ZeroWave account</p>
      <form id="signinForm" class="row">
        {% csrf_token %}
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="your.email@example.com" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required />
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; font-size:.9rem">
          <label style="display:flex;gap:.5rem;align-items:center;color:var(--muted)"><input type="checkbox"/> Remember me</label>
          <a href="#" class="link">Forgot password?</a>
        </div>
        <button class="btn" type="submit">Sign In to ZeroWave <span aria-hidden>🌍</span></button>
      </form>
      <p class="small" style="margin-top:1rem">Don't have an account? <a class="link" href="{% url 'registration' %}">Join Now</a></p>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "{{ firebase_api_key }}",
      authDomain: "{{ firebase_auth_domain }}",
      projectId: "{{ firebase_project_id }}",
      storageBucket: "{{ firebase_storage_bucket }}",
      messagingSenderId: "{{ firebase_messaging_sender_id }}",
      appId: "{{ firebase_app_id }}"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const signinForm = document.getElementById('signinForm');
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const idToken = await userCredential.user.getIdToken();

        const response = await fetch('/auth/firebase/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ idToken: idToken })
        });

        if (response.ok) {
          window.location.href = '/dashboard';
        } else {
          alert("Authentication failed on server");
        }
      } catch (error) {
        alert(error.message);
      }
    });

    const t=document.getElementById('themeToggle');
    t.addEventListener('click',()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'':'dark';localStorage.setItem('theme',document.documentElement.dataset.theme||'light')});
    if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';
  </script>
</body>
</html>
